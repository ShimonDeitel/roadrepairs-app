name: roadrepairs
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  roadrepairs:
    type: application
    platform: iOS
    sources: [roadrepairs]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.roadrepairs
        INFOPLIST_FILE: roadrepairs/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
    info:
      path: roadrepairs/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleDisplayName: Roadside Repairs
  roadrepairsTests:
    type: bundle.unit-test
    platform: iOS
    sources: [roadrepairsTests]
    dependencies:
      - target: roadrepairs
  roadrepairsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [roadrepairsUITests]
    dependencies:
      - target: roadrepairs
schemes:
  roadrepairs:
    build:
      targets:
        roadrepairs: all
    test:
      targets:
        - roadrepairsTests
        - roadrepairsUITests
